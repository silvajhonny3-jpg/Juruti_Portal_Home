<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to SE Suite - JURUTI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #1a3a6e 50%, #0d2a5e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at center, rgba(59,130,246,0.08) 0%, transparent 60%);
      animation: pulse-bg 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-bg {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: float-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      min-width: 300px;
    }

    @keyframes float-in {
      from { opacity: 0; transform: translateY(30px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      background: rgba(255,255,255,0.1);
      border-color: rgba(99,179,237,0.5);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(59,130,246,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .card:active {
      transform: translateY(-4px) scale(1.01);
    }

    .logo-ring {
      position: relative;
      width: 148px;
      height: 148px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #3b82f6, #60a5fa, #93c5fd, #3b82f6);
      animation: spin 4s linear infinite;
      z-index: 0;
    }

    .logo-ring::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #0d1f42;
      z-index: 1;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .logo-img {
      position: relative;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: contain;
      z-index: 2;
    }

    .badge {
      background: rgba(59,130,246,0.2);
      border: 1px solid rgba(99,179,237,0.4);
      border-radius: 100px;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #93c5fd;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.5;
      letter-spacing: -0.3px;
    }

    .title span {
      color: #60a5fa;
    }

    .arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(59,130,246,0.2);
      border: 1px solid rgba(99,179,237,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .card:hover .arrow {
      background: rgba(59,130,246,0.5);
      border-color: #60a5fa;
      transform: translateX(4px);
    }

    .arrow svg {
      width: 16px;
      height: 16px;
      stroke: #93c5fd;
    }

    .glow {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    }
  </style>
</head>
